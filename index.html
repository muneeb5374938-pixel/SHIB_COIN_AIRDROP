<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIB Airdrop Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        button {
            background-color: #f3ba2f;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>🎁 Watch Ad & Earn SHIB</h2>
    <p>Complete the task below to earn 500 SHIB instantly!</p>
    
    <button id="adBtn">Watch Ad Now</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('adBtn').addEventListener('click', () => {
            alert("Ad completed! Returning to bot...");
            tg.sendData("ad_completed");
            tg.close();
        });
    </script>
</body>
</html>
